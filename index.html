<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel="stylesheet" href="style.css">
        <title>Weather Dashboard</title>
        <script src="https://cdn.tailwindcss.com"></script>
    </head>
    <body class="bg-blue-100 flex items-center justify-center min-h-screen">
        <div class="Weather-card bg-white p-8 rounded-2xl shadow-xl w-80 text-center">
            <h1 class="text-2xl fount-bold mb-4">Weather App</h1>
            <input type="text" id="cityInput" placeholder="Enter city name"
            class="border p-2 w-full rounded mb-4">
            <button id="getWeatherBtn"
            class="bg-blue-500 text-white px-4 py-2 rounded w-full hover:bg-blue-600">
            Get Weather
        </button>
        <div id="weatherResult" class="mt-6">

        </div>
    </div>
    <script src="script.js"></script>

    </body>
    </html>
